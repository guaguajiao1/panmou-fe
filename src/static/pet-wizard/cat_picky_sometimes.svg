<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80" fill="none" stroke="#4a7c8a" stroke-width="1.5">
  <!-- Sometimes picky cat - sniffing food -->
  <ellipse cx="50" cy="48" rx="22" ry="12" fill="#f5f0e8"/>
  <!-- Head approaching food -->
  <circle cx="78" cy="45" r="11" fill="#f5f0e8"/>
  <circle cx="82" cy="43" r="1.5" fill="#4a7c8a"/>
  <circle cx="74" cy="43" r="1.5" fill="#4a7c8a"/>
  <!-- Ears -->
  <path d="M70 36 L66 25 L74 33" fill="#f5f0e8"/>
  <path d="M84 36 L88 25 L80 33" fill="#f5f0e8"/>
  <!-- Whiskers -->
  <path d="M88 48 L98 46" stroke-width="0.8"/>
  <path d="M88 50 L98 52" stroke-width="0.8"/>
  <!-- Legs -->
  <path d="M32 58 L30 70" stroke-width="2.5"/>
  <path d="M45 60 L43 70" stroke-width="2.5"/>
  <path d="M58 60 L60 70" stroke-width="2.5"/>
  <path d="M70 58 L72 70" stroke-width="2.5"/>
  <!-- Food bowl -->
  <ellipse cx="92" cy="60" rx="8" ry="3" fill="none" stroke="#4a7c8a"/>
  <ellipse cx="92" cy="57" rx="6" ry="2" fill="#e8ddd0"/>
  <!-- Question mark -->
  <text x="80" y="28" font-size="12" fill="#4a7c8a" font-family="sans-serif">?</text>
  <!-- Tail -->
  <path d="M28 45 Q15 38 18 28" stroke-width="2"/>
</svg>
