<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80" fill="none" stroke="#4a7c8a" stroke-width="1.5">
  <!-- Thin dog with visible ribs -->
  <ellipse cx="50" cy="45" rx="25" ry="12" fill="#f5f0e8"/>
  <!-- Ribs lines -->
  <path d="M35 40 L35 50"/>
  <path d="M42 38 L42 52"/>
  <path d="M50 38 L50 52"/>
  <path d="M58 38 L58 52"/>
  <!-- Head -->
  <circle cx="78" cy="35" r="10" fill="#f5f0e8"/>
  <circle cx="81" cy="33" r="2" fill="#4a7c8a"/>
  <ellipse cx="85" cy="38" rx="4" ry="2" fill="#f5f0e8"/>
  <!-- Ears -->
  <ellipse cx="73" cy="26" rx="4" ry="6" fill="#f5f0e8"/>
  <!-- Legs - thin -->
  <path d="M30 55 L28 72" stroke-width="2"/>
  <path d="M40 56 L38 72" stroke-width="2"/>
  <path d="M60 56 L62 72" stroke-width="2"/>
  <path d="M70 55 L72 72" stroke-width="2"/>
  <!-- Tail -->
  <path d="M25 42 Q15 35 18 28" stroke-width="2"/>
</svg>
