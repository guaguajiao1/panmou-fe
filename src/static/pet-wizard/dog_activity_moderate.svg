<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80" fill="none" stroke="#4a7c8a" stroke-width="1.5">
  <!-- Moderate activity dog - sitting playfully -->
  <ellipse cx="50" cy="55" rx="20" ry="15" fill="#f5f0e8"/>
  <!-- Head -->
  <circle cx="55" cy="30" r="14" fill="#f5f0e8"/>
  <circle cx="60" cy="27" r="2" fill="#4a7c8a"/>
  <!-- Happy face -->
  <path d="M58 35 Q62 40 66 35" stroke-width="1.2"/>
  <!-- Tongue -->
  <ellipse cx="62" cy="38" rx="3" ry="4" fill="#e8a0a0" stroke="#e8a0a0"/>
  <!-- Ear -->
  <ellipse cx="45" cy="20" rx="6" ry="8" fill="#f5f0e8"/>
  <!-- Front legs -->
  <path d="M38 58 L36 72" stroke-width="3"/>
  <path d="M48 60 L46 72" stroke-width="3"/>
  <!-- Back legs tucked -->
  <ellipse cx="60" cy="65" rx="10" ry="6" fill="#f5f0e8"/>
  <!-- Tail wagging -->
  <path d="M70 52 Q82 45 78 35" stroke-width="2.5"/>
  <!-- Wagging lines -->
  <path d="M80 38 L85 35" stroke-width="1" opacity="0.6"/>
  <path d="M82 42 L87 42" stroke-width="1" opacity="0.6"/>
</svg>
