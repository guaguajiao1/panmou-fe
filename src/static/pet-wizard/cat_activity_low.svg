<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80" fill="none" stroke="#4a7c8a" stroke-width="1.5">
  <!-- Low activity cat - curled up sleeping -->
  <ellipse cx="50" cy="50" rx="30" ry="20" fill="#f5f0e8"/>
  <!-- Head tucked in -->
  <circle cx="70" cy="42" r="12" fill="#f5f0e8"/>
  <!-- Closed eyes -->
  <path d="M72 40 Q74 38 76 40" stroke-width="1"/>
  <path d="M66 40 Q68 38 70 40" stroke-width="1"/>
  <!-- Small ears -->
  <path d="M62 32 L60 24 L66 30" fill="#f5f0e8"/>
  <path d="M78 32 L80 24 L74 30" fill="#f5f0e8"/>
  <!-- Tail wrapped around -->
  <path d="M20 50 Q15 60 30 65 Q50 68 60 58" stroke-width="2.5"/>
  <!-- ZZZ -->
  <text x="78" y="28" font-size="10" fill="#4a7c8a" font-family="sans-serif">z</text>
  <text x="83" y="22" font-size="8" fill="#4a7c8a" font-family="sans-serif">z</text>
</svg>
