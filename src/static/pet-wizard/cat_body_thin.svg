<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80" fill="none" stroke="#4a7c8a" stroke-width="1.5">
  <!-- Thin cat with visible ribs -->
  <ellipse cx="50" cy="45" rx="22" ry="10" fill="#f5f0e8"/>
  <!-- Ribs -->
  <path d="M38 40 L38 50"/>
  <path d="M46 39 L46 51"/>
  <path d="M54 39 L54 51"/>
  <path d="M62 40 L62 50"/>
  <!-- Head -->
  <circle cx="78" cy="38" r="10" fill="#f5f0e8"/>
  <circle cx="81" cy="36" r="1.5" fill="#4a7c8a"/>
  <circle cx="75" cy="36" r="1.5" fill="#4a7c8a"/>
  <!-- Ears - pointed -->
  <path d="M70 30 L68 20 L74 28" fill="#f5f0e8"/>
  <path d="M84 30 L86 20 L80 28" fill="#f5f0e8"/>
  <!-- Whiskers -->
  <path d="M85 40 L95 38" stroke-width="0.8"/>
  <path d="M85 42 L95 44" stroke-width="0.8"/>
  <!-- Legs -->
  <path d="M32 53 L30 70" stroke-width="2"/>
  <path d="M42 54 L40 70" stroke-width="2"/>
  <path d="M60 54 L62 70" stroke-width="2"/>
  <path d="M70 53 L72 70" stroke-width="2"/>
  <!-- Tail - long curved -->
  <path d="M28 42 Q15 35 10 45 Q5 55 15 55" stroke-width="2"/>
</svg>
