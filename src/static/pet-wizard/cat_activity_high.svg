<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80" fill="none" stroke="#4a7c8a" stroke-width="1.5">
  <!-- High activity cat - pounce position -->
  <ellipse cx="50" cy="50" rx="25" ry="14" fill="#f5f0e8" transform="rotate(-10 50 50)"/>
  <!-- Head low - ready to pounce -->
  <circle cx="80" cy="48" r="12" fill="#f5f0e8"/>
  <circle cx="84" cy="45" r="1.5" fill="#4a7c8a"/>
  <circle cx="76" cy="45" r="1.5" fill="#4a7c8a"/>
  <!-- Alert ears -->
  <path d="M72 38 L68 26 L76 35" fill="#f5f0e8"/>
  <path d="M86 38 L90 26 L82 35" fill="#f5f0e8"/>
  <!-- Whiskers -->
  <path d="M90 50 L100 48" stroke-width="0.8"/>
  <path d="M90 52 L100 54" stroke-width="0.8"/>
  <!-- Back legs ready -->
  <path d="M25 58 L18 70" stroke-width="2.5"/>
  <path d="M35 60 L30 72" stroke-width="2.5"/>
  <!-- Front legs stretched -->
  <path d="M70 55 L78 68" stroke-width="2.5"/>
  <path d="M80 52 L90 62" stroke-width="2.5"/>
  <!-- Tail up excited -->
  <path d="M20 45 Q8 35 15 25" stroke-width="2.5"/>
</svg>
