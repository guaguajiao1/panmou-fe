<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80" fill="none" stroke="#4a7c8a" stroke-width="1.5">
  <!-- Overweight fat dog - very round -->
  <ellipse cx="50" cy="50" rx="38" ry="25" fill="#f5f0e8"/>
  <!-- Head -->
  <circle cx="88" cy="42" r="10" fill="#f5f0e8"/>
  <circle cx="91" cy="40" r="2" fill="#4a7c8a"/>
  <ellipse cx="95" cy="44" rx="4" ry="2" fill="#f5f0e8"/>
  <!-- Ears - small -->
  <ellipse cx="84" cy="33" rx="4" ry="5" fill="#f5f0e8"/>
  <!-- Legs - very short -->
  <path d="M20 70 L18 76" stroke-width="5"/>
  <path d="M35 72 L33 76" stroke-width="5"/>
  <path d="M68 72 L70 76" stroke-width="5"/>
  <path d="M83 70 L85 76" stroke-width="5"/>
  <!-- Tail - curly -->
  <path d="M12 48 Q5 48 8 40" stroke-width="3"/>
</svg>
