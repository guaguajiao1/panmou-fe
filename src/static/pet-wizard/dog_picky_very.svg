<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80" fill="none" stroke="#4a7c8a" stroke-width="1.5">
  <!-- Very picky dog - turning away from food -->
  <ellipse cx="55" cy="45" rx="25" ry="14" fill="#f5f0e8"/>
  <!-- Head turned away -->
  <circle cx="35" cy="32" r="12" fill="#f5f0e8"/>
  <circle cx="30" cy="30" r="2" fill="#4a7c8a"/>
  <!-- Snooty expression -->
  <path d="M26 35 L22 38" stroke-width="1.2"/>
  <!-- Ear -->
  <ellipse cx="42" cy="22" rx="5" ry="7" fill="#f5f0e8"/>
  <!-- Legs -->
  <path d="M40 57 L38 72" stroke-width="3"/>
  <path d="M55 58 L53 72" stroke-width="3"/>
  <path d="M70 58 L72 72" stroke-width="3"/>
  <path d="M80 56 L82 72" stroke-width="3"/>
  <!-- Food bowl ignored -->
  <ellipse cx="85" cy="68" rx="10" ry="4" fill="none" stroke="#4a7c8a"/>
  <ellipse cx="85" cy="65" rx="8" ry="3" fill="#e8ddd0"/>
  <!-- Tail down -->
  <path d="M80 42 Q90 45 88 55" stroke-width="2"/>
</svg>
