<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80" fill="none" stroke="#4a7c8a" stroke-width="1.5">
  <!-- Sometimes picky dog - sniffing food hesitantly -->
  <ellipse cx="50" cy="48" rx="26" ry="14" fill="#f5f0e8"/>
  <!-- Head tilted looking at food -->
  <circle cx="80" cy="42" r="12" fill="#f5f0e8"/>
  <circle cx="84" cy="40" r="2" fill="#4a7c8a"/>
  <!-- Nose near food -->
  <ellipse cx="92" cy="48" rx="4" ry="2" fill="#f5f0e8"/>
  <!-- Ear -->
  <ellipse cx="74" cy="32" rx="5" ry="7" fill="#f5f0e8"/>
  <!-- Legs -->
  <path d="M28 60 L26 72" stroke-width="3"/>
  <path d="M42 62 L40 72" stroke-width="3"/>
  <path d="M60 62 L62 72" stroke-width="3"/>
  <path d="M72 60 L74 72" stroke-width="3"/>
  <!-- Food bowl -->
  <ellipse cx="95" cy="65" rx="8" ry="3" fill="none" stroke="#4a7c8a"/>
  <ellipse cx="95" cy="62" rx="6" ry="2" fill="#e8ddd0"/>
  <!-- Question mark -->
  <text x="85" y="28" font-size="12" fill="#4a7c8a" font-family="sans-serif">?</text>
  <!-- Tail neutral -->
  <path d="M24 45 Q15 40 18 32" stroke-width="2"/>
</svg>
