<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80" fill="none" stroke="#4a7c8a" stroke-width="1.5">
  <!-- Very picky cat - turning away from food -->
  <ellipse cx="55" cy="48" rx="22" ry="12" fill="#f5f0e8"/>
  <!-- Head turned away snobbily -->
  <circle cx="35" cy="38" r="11" fill="#f5f0e8"/>
  <circle cx="30" cy="36" r="1.5" fill="#4a7c8a"/>
  <!-- Closed eye disdain -->
  <path d="M36 36 Q38 34 40 36" stroke-width="1"/>
  <!-- Ears -->
  <path d="M28 28 L24 18 L32 26" fill="#f5f0e8"/>
  <path d="M42 28 L46 18 L38 26" fill="#f5f0e8"/>
  <!-- Whiskers -->
  <path d="M25 40 L15 38" stroke-width="0.8"/>
  <path d="M25 42 L15 44" stroke-width="0.8"/>
  <!-- Legs -->
  <path d="M40 58 L38 70" stroke-width="2.5"/>
  <path d="M52 60 L50 70" stroke-width="2.5"/>
  <path d="M65 60 L67 70" stroke-width="2.5"/>
  <path d="M75 58 L77 70" stroke-width="2.5"/>
  <!-- Food bowl ignored -->
  <ellipse cx="88" cy="66" rx="8" ry="3" fill="none" stroke="#4a7c8a"/>
  <ellipse cx="88" cy="63" rx="6" ry="2" fill="#e8ddd0"/>
  <!-- Tail swishing annoyed -->
  <path d="M77 45 Q88 42 85 55" stroke-width="2"/>
</svg>
