<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80" fill="none" stroke="#4a7c8a" stroke-width="1.5">
  <!-- Athlete dog - running/jumping -->
  <ellipse cx="50" cy="40" rx="30" ry="14" fill="#f5f0e8" transform="rotate(-15 50 40)"/>
  <!-- Head -->
  <circle cx="82" cy="25" r="12" fill="#f5f0e8"/>
  <circle cx="87" cy="22" r="2" fill="#4a7c8a"/>
  <ellipse cx="92" cy="27" rx="5" ry="3" fill="#f5f0e8"/>
  <!-- Ears flying back -->
  <ellipse cx="74" cy="18" rx="8" ry="5" fill="#f5f0e8" transform="rotate(-30 74 18)"/>
  <!-- Legs - running pose -->
  <path d="M25 50 L15 65" stroke-width="3"/>
  <path d="M35 52 L40 70" stroke-width="3"/>
  <path d="M65 48 L75 62" stroke-width="3"/>
  <path d="M75 45 L90 55" stroke-width="3"/>
  <!-- Tail streaming back -->
  <path d="M20 35 Q5 30 8 20" stroke-width="2.5"/>
  <!-- Speed lines -->
  <path d="M5 40 L15 40" stroke-width="1" opacity="0.5"/>
  <path d="M3 45 L13 45" stroke-width="1" opacity="0.5"/>
  <path d="M5 50 L15 50" stroke-width="1" opacity="0.5"/>
</svg>
