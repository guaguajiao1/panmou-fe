<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80" fill="none" stroke="#4a7c8a" stroke-width="1.5">
  <!-- Good eater cat - eating happily -->
  <ellipse cx="50" cy="50" rx="22" ry="12" fill="#f5f0e8"/>
  <!-- Head down eating -->
  <circle cx="80" cy="52" r="11" fill="#f5f0e8"/>
  <!-- Ears -->
  <path d="M72 44 L68 33 L76 41" fill="#f5f0e8"/>
  <path d="M86 44 L90 33 L82 41" fill="#f5f0e8"/>
  <!-- Whiskers -->
  <path d="M88 54 L98 52" stroke-width="0.8"/>
  <!-- Legs -->
  <path d="M32 60 L30 70" stroke-width="2.5"/>
  <path d="M45 62 L43 70" stroke-width="2.5"/>
  <path d="M58 62 L60 70" stroke-width="2.5"/>
  <path d="M70 60 L72 70" stroke-width="2.5"/>
  <!-- Food bowl -->
  <ellipse cx="92" cy="58" rx="10" ry="4" fill="none" stroke="#4a7c8a"/>
  <ellipse cx="92" cy="55" rx="8" ry="3" fill="#e8ddd0"/>
  <!-- Tail up happy -->
  <path d="M28 47 Q12 35 20 25" stroke-width="2.5"/>
</svg>
